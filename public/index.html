<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtemGPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .app {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
            height: 90vh;
        }
        
        .sidebar {
            width: 300px;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .sidebar-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: center;
        }
        
        .sidebar-header h3 {
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .new-chat-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
        }
        
        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .session-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            position: relative;
        }
        
        .session-item:hover {
            background: #e9ecef;
        }
        
        .session-item.active {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border-left-color: #667eea;
        }
        
        .session-name {
            font-weight: 600;
            font-size: 14px;
            color: #333;
            padding-right: 25px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .delete-session {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            cursor: pointer;
            font-size: 14px;
            opacity: 0;
        }
        
        .session-item:hover .delete-session {
            opacity: 1;
        }
        
        .main-chat {
            flex: 1;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            animation: bounce 1s ease infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.5;
        }
        
        .user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 18px;
            border-radius: 18px;
        }
        
        .assistant .message-content {
            background: white;
            color: #333;
            padding: 12px 18px;
            border-radius: 18px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .assistant {
            gap: 10px;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .message-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            width: 100%;
        }
        
        .code-block {
            margin: 12px 0;
            border-radius: 12px;
            overflow: hidden;
            background: #1e1e1e;
        }
        
        .code-header {
            background: #2d2d2d;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .code-language {
            color: #9cdcfe;
            font-size: 12px;
        }
        
        .code-btn {
            background: #3d3d3d;
            border: none;
            color: #ccc;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            margin-left: 8px;
        }
        
        .code-btn:hover {
            background: #4d4d4d;
        }
        
        .code-content {
            padding: 16px;
            overflow-x: auto;
        }
        
        .code-content pre {
            margin: 0;
            font-family: monospace;
            font-size: 13px;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
        }
        
        input:focus {
            border-color: #667eea;
        }
        
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 18px;
        }
        
        .typing span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        .status {
            background: #f0f0f0;
            padding: 8px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
        
        @media (max-width: 768px) {
            .app {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                max-height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>📋 Диалоги</h3>
                <button class="new-chat-btn" onclick="createNewChat()">➕ Новый диалог</button>
            </div>
            <div class="sessions-list" id="sessionsList">
                <div style="text-align: center; color: #999; padding: 20px;">Загрузка...</div>
            </div>
        </div>
        
        <div class="main-chat">
            <div class="header">
                <div class="logo">🎭</div>
                <h1>ArtemGPT</h1>
                <p id="sessionNameHeader">AI с характером</p>
            </div>
            
            <div class="chat-container" id="chatContainer">
                <div class="message assistant">
                    <div class="message-wrapper">
                        <div class="avatar">🎭</div>
                        <div class="message-content">
                            Привет! Я ArtemGPT. Чем могу помочь? 😊
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Спроси ArtemGPT..." onkeypress="handleKeyPress(event)" autofocus>
                <button onclick="sendMessage()">Отправить</button>
            </div>
            <div class="status">
                🟢 ArtemGPT онлайн
            </div>
        </div>
    </div>
    
    <script>
        let currentSessionId = null;
        let isTyping = false;
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || isTyping) return;
            
            addMessage(message, 'user');
            input.value = '';
            showTyping();
            isTyping = true;
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, sessionId: currentSessionId })
                });
                
                const data = await response.json();
                removeTyping();
                
                if (data.success) {
                    addMessage(data.response, 'assistant');
                    await loadSessions();
                } else {
                    addMessage('❌ Ошибка: ' + data.error, 'assistant');
                }
            } catch (error) {
                removeTyping();
                addMessage('❌ Ошибка подключения к серверу', 'assistant');
                console.error('Fetch error:', error);
            } finally {
                isTyping = false;
            }
        }
        
        function addMessage(text, sender) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            
            if (sender === 'assistant') {
                const formatted = formatCode(text);
                div.innerHTML = `
                    <div class="message-wrapper">
                        <div class="avatar">🎭</div>
                        <div class="message-content">${formatted}</div>
                    </div>
                `;
                div.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
            } else {
                div.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function formatCode(text) {
            return text.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                return `
                    <div class="code-block">
                        <div class="code-header">
                            <span class="code-language">${lang || 'text'}</span>
                            <div>
                                <button class="code-btn" onclick="copyCode(this)">📋 Копировать</button>
                                <button class="code-btn" onclick="downloadCode(this)">💾 Скачать</button>
                            </div>
                        </div>
                        <div class="code-content">
                            <pre><code class="language-${lang}">${escapeHtml(code.trim())}</code></pre>
                        </div>
                    </div>
                `;
            }).replace(/\n/g, '<br>');
        }
        
        function copyCode(btn) {
            const code = btn.closest('.code-block').querySelector('code').textContent;
            navigator.clipboard.writeText(code);
            btn.textContent = '✅';
            setTimeout(() => btn.textContent = '📋 Копировать', 1500);
        }
        
        function downloadCode(btn) {
            const code = btn.closest('.code-block').querySelector('code').textContent;
            const blob = new Blob([code], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'code.txt';
            a.click();
            URL.revokeObjectURL(a.href);
        }
        
        async function loadSessions() {
            try {
                const res = await fetch('/api/sessions');
                const data = await res.json();
                const list = document.getElementById('sessionsList');
                
                if (data.sessions?.length) {
                    list.innerHTML = data.sessions.map(s => `
                        <div class="session-item ${currentSessionId === s.id ? 'active' : ''}" onclick="switchSession('${s.id}')">
                            <span class="delete-session" onclick="event.stopPropagation(); deleteSession('${s.id}')">🗑️</span>
                            <div class="session-name">${escapeHtml(s.name)}</div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">Нет диалогов</div>';
                }
            } catch(e) { console.error(e); }
        }
        
        async function switchSession(id) {
            await fetch(`/api/sessions/${id}/switch`, { method: 'POST' });
            currentSessionId = id;
            loadSessionMessages(id);
            loadSessions();
        }
        
        async function loadSessionMessages(id) {
            try {
                const res = await fetch(`/api/sessions/${id}`);
                const data = await res.json();
                if (data.session) {
                    const container = document.getElementById('chatContainer');
                    container.innerHTML = '';
                    data.session.messages.forEach(msg => {
                        addMessage(msg.content, msg.role);
                    });
                    document.getElementById('sessionNameHeader').textContent = data.session.name;
                    currentSessionId = data.session.id;
                }
            } catch(e) { console.error(e); }
        }
        
        async function createNewChat() {
            const res = await fetch('/api/sessions', { method: 'POST' });
            const data = await res.json();
            if (data.session) {
                await loadSessionMessages(data.session.id);
                loadSessions();
            }
        }
        
        async function deleteSession(id) {
            if (!confirm('Удалить диалог?')) return;
            await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
            const res = await fetch('/api/sessions');
            const data = await res.json();
            if (data.sessions.length) {
                await loadSessionMessages(data.sessions[0].id);
            } else {
                await createNewChat();
            }
            loadSessions();
        }
        
        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }
        
        function showTyping() {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="message-wrapper">
                    <div class="avatar">🎭</div>
                    <div class="message-content"><div class="typing"><span></span><span></span><span></span></div></div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Загрузка первой сессии
        fetch('/api/sessions').then(res => res.json()).then(data => {
            if (data.sessions?.length) {
                loadSessionMessages(data.sessions[0].id);
            } else {
                createNewChat();
            }
            loadSessions();
        });
    </script>
</body>
</html>
