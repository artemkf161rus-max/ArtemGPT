<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ArtemGPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .chat-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .logo { font-size: 48px; animation: bounce 1s ease infinite; display: inline-block; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .messages {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        .message.user { justify-content: flex-end; }
        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        .user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .assistant .message-content {
            background: white;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 10px;
        }
        .assistant { align-items: flex-start; }
        .code-block {
            margin: 12px 0;
            border-radius: 12px;
            overflow: hidden;
            background: #1e1e1e;
        }
        .code-header {
            background: #2d2d2d;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
        }
        .code-btn {
            background: #3d3d3d;
            border: none;
            color: #ccc;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 8px;
        }
        .code-content { padding: 16px; overflow-x: auto; }
        .code-content pre { margin: 0; font-family: monospace; }
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
        }
        input:focus { border-color: #667eea; }
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 18px;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .status {
            background: #f0f0f0;
            padding: 8px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <div class="logo">🎭</div>
            <h1>ArtemGPT</h1>
            <p>AI с характером</p>
        </div>
        
        <div class="messages" id="messages">
            <div class="message assistant">
                <div class="avatar">🎭</div>
                <div class="message-content">Привет! Я ArtemGPT. Чем могу помочь? 😊</div>
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="input" placeholder="Спроси ArtemGPT..." onkeypress="if(event.key==='Enter') send()" autofocus>
            <button onclick="send()">Отправить</button>
        </div>
        <div class="status">🟢 ArtemGPT онлайн</div>
    </div>
    
    <script>
        let history = [];
        
        function addMessage(text, sender) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            
            if (sender === 'assistant') {
                const formatted = formatCode(text);
                div.innerHTML = `<div class="avatar">🎭</div><div class="message-content">${formatted}</div>`;
                setTimeout(() => {
                    div.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
                }, 10);
            } else {
                div.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function formatCode(text) {
            return text.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                return `
                    <div class="code-block">
                        <div class="code-header">
                            <span>${lang || 'text'}</span>
                            <div>
                                <button class="code-btn" onclick="copyCode(this)">📋 Копировать</button>
                                <button class="code-btn" onclick="downloadCode(this)">💾 Скачать</button>
                            </div>
                        </div>
                        <div class="code-content">
                            <pre><code class="language-${lang}">${escapeHtml(code.trim())}</code></pre>
                        </div>
                    </div>
                `;
            }).replace(/\n/g, '<br>');
        }
        
        function copyCode(btn) {
            const code = btn.closest('.code-block').querySelector('code').textContent;
            navigator.clipboard.writeText(code);
            btn.textContent = '✅';
            setTimeout(() => btn.textContent = '📋 Копировать', 1500);
        }
        
        function downloadCode(btn) {
            const code = btn.closest('.code-block').querySelector('code').textContent;
            const blob = new Blob([code], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'code.txt';
            a.click();
            URL.revokeObjectURL(a.href);
        }
        
        async function send() {
            const input = document.getElementById('input');
            const message = input.value.trim();
            if (!message) return;
            
            addMessage(message, 'user');
            input.value = '';
            
            // Показываем печатание
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = `<div class="avatar">🎭</div><div class="message-content"><div class="typing"><span></span><span></span><span></span></div></div>`;
            document.getElementById('messages').appendChild(typingDiv);
            
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, history })
                });
                
                const data = await res.json();
                document.getElementById('typing')?.remove();
                
                if (data.success) {
                    addMessage(data.response, 'assistant');
                    history.push({ role: 'user', content: message });
                    history.push({ role: 'assistant', content: data.response });
                    if (history.length > 20) history = history.slice(-20);
                } else {
                    addMessage('❌ Ошибка: ' + data.error, 'assistant');
                }
            } catch (error) {
                document.getElementById('typing')?.remove();
                addMessage('❌ Ошибка подключения к серверу', 'assistant');
                console.error('Fetch error:', error);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
